  processed_path: data/processed/panel_daily.parquet
  tushare_token_env: TUSHARE_TOKEN
  prefer_tushare: true
  sleep_seconds: 0.25
  indices:
    - {symbol: "000300.SH", ak_symbol: "sh000300", name: "沪深300"}
    - {symbol: "000905.SH", ak_symbol: "sh000905", name: "中证500"}
    - {symbol: "000852.SH", ak_symbol: "sh000852", name: "中证1000"}
    - {symbol: "399006.SZ", ak_symbol: "sz399006", name: "创业板指"}
    - {symbol: "000688.SH", ak_symbol: "sh000688", name: "科创50"}
    - {symbol: "000015.SH", ak_symbol: "sh000015", name: "红利指数"}
    - {symbol: "000932.SH", ak_symbol: "sh000932", name: "中证消费"}
    - {symbol: "000933.SH", ak_symbol: "sh000933", name: "中证医药"}
    - {symbol: "931865.CSI", ak_symbol: "sh931865", name: "中证半导体"}
    - {symbol: "399808.SZ", ak_symbol: "sz399808", name: "中证新能源"}
    - {symbol: "399959.SZ", ak_symbol: "sz399959", name: "军工指数"}
    - {symbol: "000934.SH", ak_symbol: "sh000934", name: "中证金融"}
